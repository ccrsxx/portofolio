name: Deployment

run-name: ${{ github.event_name == 'workflow_dispatch' && format('Manual deploy / {0}', inputs.sha || github.sha) || format('Automatic deploy / {0}', github.event.head_commit.message) }}

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA to deploy'
        required: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml

  extract-node-version:
    uses: ./.github/workflows/extract-node-version.yaml

  deploy:
    name: Build and deploy via Docker on VPS
    runs-on: self-hosted
    environment: production

    needs:
      - ci
      - extract-node-version

    permissions:
      packages: write

    env:
      SHA: ${{ inputs.sha || github.sha }}
      CACHE_IMAGE: 'ghcr.io/${{ github.repository }}:cache'
      LATEST_IMAGE: 'ghcr.io/${{ github.repository }}:latest'

      CURRENT_IMAGE: ''

    steps:
      - name: Set current image tag
        run: |
          echo "CURRENT_IMAGE=ghcr.io/${{ github.repository }}:${{ env.SHA }}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SHA }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Check if image already exists
        id: image-check
        run: |
          if docker buildx imagetools inspect "${{ env.CURRENT_IMAGE }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${{ env.CURRENT_IMAGE }} already exists, skipping build"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "${{ env.CURRENT_IMAGE }} not found, will build"
          fi

      - name: Determine image tags
        id: tags
        if: steps.image-check.outputs.exists != 'true'
        run: |
          tags="${{ env.CURRENT_IMAGE }}"

          if [ "${{ github.event_name }}" = "push" ]; then
            tags="$tags,${{ env.LATEST_IMAGE }}"
          fi

          echo "Determined tags: $tags"

          echo "tags=$tags" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        if: steps.image-check.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          tags: ${{ steps.tags.outputs.tags }}
          platforms: linux/arm64
          build-args: |
            NODE_VERSION=${{ needs.extract-node-version.outputs.node-version }}
            NODE_DISTROLESS_VERSION=${{ needs.extract-node-version.outputs.node-distroless-version }}
            NEXT_PUBLIC_URL=${{ secrets.NEXT_PUBLIC_URL }}
            INTERNAL_BACKEND_URL=${{ secrets.INTERNAL_BACKEND_URL }}
            NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
            NEXT_PUBLIC_OWNER_BEARER_TOKEN=${{ secrets.NEXT_PUBLIC_OWNER_BEARER_TOKEN }}
            NEXT_PUBLIC_CLOUDFLARE_TURNSTILE_SITE_KEY=${{ secrets.NEXT_PUBLIC_CLOUDFLARE_TURNSTILE_SITE_KEY }}
          secrets: |
            gh_token=${{ secrets.GH_TOKEN }}
            private_secret_key=${{ secrets.PRIVATE_SECRET_KEY }}
          push: true
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}
          cache-to: type=registry,ref=${{ env.CACHE_IMAGE }},mode=max

      - name: Setup env
        run: |
          cat >> .env << 'EOF'

          INTERNAL_BACKEND_URL=${{ secrets.INTERNAL_BACKEND_URL }}

          NEXT_PUBLIC_URL=${{ secrets.NEXT_PUBLIC_URL }}
          NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
          NEXT_PUBLIC_OWNER_BEARER_TOKEN=${{ secrets.NEXT_PUBLIC_OWNER_BEARER_TOKEN }}
          NEXT_PUBLIC_CLOUDFLARE_TURNSTILE_SITE_KEY=${{ secrets.NEXT_PUBLIC_CLOUDFLARE_TURNSTILE_SITE_KEY }}

          GH_TOKEN=${{ secrets.GH_TOKEN }}
          PRIVATE_SECRET_KEY=${{ secrets.PRIVATE_SECRET_KEY }}

          EOF

      - name: Deploy with Docker Compose
        env:
          IMAGE_TAG: ${{ env.SHA }}
        run: |
          docker compose pull
          docker compose up -d
