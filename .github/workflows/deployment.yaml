name: Deployment

run-name: ${{ github.event_name == 'workflow_dispatch' && format('Manual deploy / {0}', inputs.sha || github.sha) || format('Automatic deploy / {0}', github.event.head_commit.message) }}

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA to deploy'
        required: false

# Serialize deploys: a second run waits for the first instead of racing it.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml

  extract-node-version:
    uses: ./.github/workflows/extract-node-version.yaml

  deploy:
    name: Build and deploy via Docker on VPS
    runs-on: self-hosted
    environment: production

    needs:
      - ci
      - extract-node-version

    permissions:
      packages: write

    env:
      SHA: ${{ inputs.sha || github.sha }}
      CACHE_IMAGE: 'ghcr.io/${{ github.repository }}:cache'
      LATEST_IMAGE: 'ghcr.io/${{ github.repository }}:latest'

      CURRENT_IMAGE: ''

      # Persistent deploy directory on the VPS (holds compose.yaml, Caddyfile,
      # scripts, .env and deploy.state). Lives outside the checkout so it
      # survives `actions/checkout` cleaning the workspace.
      DEPLOY_DIR: /opt/portofolio

    steps:
      - name: Set current image tag
        run: |
          echo "CURRENT_IMAGE=ghcr.io/${{ github.repository }}:${{ env.SHA }}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SHA }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image already exists
        id: image
        run: |
          if docker manifest inspect "${{ env.CURRENT_IMAGE }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image ${{ env.CURRENT_IMAGE }} already in registry, skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.image.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        if: steps.image.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          tags: |
            ${{ env.LATEST_IMAGE }}
            ${{ env.CURRENT_IMAGE }}
          platforms: linux/arm64
          build-args: |
            NODE_VERSION=${{ needs.extract-node-version.outputs.node-version }}
            NODE_DISTROLESS_VERSION=${{ needs.extract-node-version.outputs.node-distroless-version }}
            NEXT_PUBLIC_URL=${{ secrets.NEXT_PUBLIC_URL }}
            INTERNAL_BACKEND_URL=${{ secrets.INTERNAL_BACKEND_URL }}
            NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
            NEXT_PUBLIC_OWNER_BEARER_TOKEN=${{ secrets.NEXT_PUBLIC_OWNER_BEARER_TOKEN }}
          secrets: |
            gh_token=${{ secrets.GH_TOKEN }}
            private_secret_key=${{ secrets.PRIVATE_SECRET_KEY }}
          push: true
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}
          cache-to: type=registry,ref=${{ env.CACHE_IMAGE }},mode=max

      - name: Sync deploy stack to ${{ env.DEPLOY_DIR }}
        run: |
          mkdir -p "$DEPLOY_DIR"

          # Compose + scripts are always refreshed from the repo (source of truth).
          cp deploy/compose.yaml "$DEPLOY_DIR/compose.yaml"
          cp deploy/deploy.sh "$DEPLOY_DIR/deploy.sh"
          cp deploy/rollback.sh "$DEPLOY_DIR/rollback.sh"
          chmod +x "$DEPLOY_DIR/deploy.sh" "$DEPLOY_DIR/rollback.sh"

          # Caddyfile holds the live upstream selection (blue/green) which the
          # deploy script manages, so only seed it once and never clobber it.
          if [ ! -f "$DEPLOY_DIR/Caddyfile" ]; then
            cp deploy/Caddyfile "$DEPLOY_DIR/Caddyfile"
          fi

      - name: Write runtime env
        run: |
          {
            echo "INTERNAL_BACKEND_URL=${{ secrets.INTERNAL_BACKEND_URL }}"
            echo "NEXT_PUBLIC_URL=${{ secrets.NEXT_PUBLIC_URL }}"
            echo "NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}"
            echo "NEXT_PUBLIC_OWNER_BEARER_TOKEN=${{ secrets.NEXT_PUBLIC_OWNER_BEARER_TOKEN }}"
            echo "GH_TOKEN=${{ secrets.GH_TOKEN }}"
            echo "PRIVATE_SECRET_KEY=${{ secrets.PRIVATE_SECRET_KEY }}"
            echo "CLOUDFLARE_TUNNEL_TOKEN=${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}"
          } > "$DEPLOY_DIR/.env"

      - name: Deploy (blue/green hot swap)
        run: |
          "$DEPLOY_DIR/deploy.sh" "${{ env.SHA }}"
